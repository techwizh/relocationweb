services:
  - type: web
    name: relocationweb-api
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: SKIP_MPESA_PAYMENT
        sync: false
      - key: MPESA_ENV
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: MPESA_ACCOUNT_REFERENCE
        value: Relocate
      - key: MPESA_TRANSACTION_DESC
        value: Move booking
      - key: BLOB_READ_WRITE_TOKEN
        sync: false
